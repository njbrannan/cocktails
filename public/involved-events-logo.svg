<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-label="Involved Events">
  <defs>
    <style>
      .word {
        font-family: Georgia, "Times New Roman", Times, serif;
        font-weight: 700;
        letter-spacing: 0.08em;
      }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Wordmarks -->
  <g filter="url(#softShadow)">
    <text x="40" y="150" font-size="124" class="word" fill="#111" stroke="#c9a30a" stroke-width="10" paint-order="stroke">
      INVOLVED
    </text>
    <text x="690" y="150" font-size="124" class="word" fill="#111" stroke="#c9a30a" stroke-width="10" paint-order="stroke">
      EVENTS
    </text>
  </g>

  <!-- Martini glyph between words -->
  <g transform="translate(560 24)" filter="url(#softShadow)">
    <path d="M40 0h160c0 44-38 84-80 104C78 84 40 44 40 0Z" fill="#f3a8b2"/>
    <path d="M120 104v88" stroke="#f3a8b2" stroke-width="18" stroke-linecap="round"/>
    <path d="M70 210h100" stroke="#f3a8b2" stroke-width="18" stroke-linecap="round"/>
  </g>

  <!-- Tagline -->
  <text x="600" y="232" text-anchor="middle" font-size="44" font-family="Georgia, 'Times New Roman', Times, serif" fill="#1e3a2a">
    Bespoke Bar Services
  </text>
</svg>

